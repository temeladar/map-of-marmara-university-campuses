<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map of Marmara University Campuses</title>
  <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Marmara Üniversitesi</h1>
        <p>Yerleşkeler / Campuses — 3B Harita</p>
      </header>
      <ul id="campus-list"></ul>
      <footer>
        <small>Koordinatlar yaklaşıktır. Harita verisi © OpenStreetMap katkıcıları, © OpenFreeMap</small>
      </footer>
    </aside>
    <div id="map">
      <div id="view-controls">
        <button id="btn-3d" class="active" title="3B görünüm">3B</button>
        <button id="btn-2d" title="Kuş bakışı">2B</button>
        <button id="btn-rotate" title="Kamerayı döndür">⟳</button>
      </div>
    </div>
  </div>

  <script src="vendor/maplibre/maplibre-gl.js"></script>
  <script src="campuses.js"></script>
  <script src="app.js"></script>
</body>
</html>
