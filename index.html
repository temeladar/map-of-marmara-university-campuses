<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marmara Üniversitesi — RTE Külliyesi 3B Harita</title>
  <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Recep Tayyip Erdoğan Külliyesi</h1>
        <p>Marmara Üniversitesi — Maltepe (Başıbüyük)</p>
      </header>
      <ul id="campus-list"></ul>
      <footer>
        <small>Harita verisi © OpenStreetMap katkıcıları, © OpenFreeMap. Uydu görüntüsü © Esri. Yükseklik verisi © Mapzen / AWS Terrain Tiles. Bina verisi OSM/Overpass'tan canlı yüklenir.</small>
      </footer>
    </aside>
    <div id="map">
      <div id="view-controls">
        <button id="btn-3d" class="active" title="3B görünüm">3B</button>
        <button id="btn-2d" title="Kuş bakışı">2B</button>
        <button id="btn-sat" title="Uydu görüntüsü">Uydu</button>
        <button id="btn-rotate" title="Kamerayı döndür">⟳</button>
      </div>
    </div>
  </div>

  <script src="vendor/maplibre/maplibre-gl.js"></script>
  <script src="vendor/three/three.min.js"></script>
  <script src="campuses.js"></script>
  <script src="app.js"></script>
</body>
</html>
